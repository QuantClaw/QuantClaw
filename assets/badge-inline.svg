  <path d="M0,-9 Q0.5,-2 1,6 Q1.5,8 1,5" class="claw-s" fill="none" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M6,-7 Q6,-1 4,6 Q3.5,8 4,5" class="claw-s" fill="none" stroke-width="1.5" stroke-linecap="round"/>
</g>

<text x="70" y="21" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="12" font-weight="500" letter-spacing="1" class="label-t">QwenClaw</text>

<text x="200" y="21" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" font-weight="500" letter-spacing="0.5" class="value-t">Opus distilled · v0.1.0</text>

