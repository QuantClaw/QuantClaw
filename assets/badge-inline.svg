  }
</style>

<rect width="280" height="32" rx="6" class="border" fill="none" stroke-width="0.5"/>

<rect width="120" height="32" rx="6" class="label-bg"/>
<rect x="114" width="6" height="32" class="label-bg"/>

<rect x="120" width="160" height="32" rx="6" class="value-bg"/>
<rect x="120" width="6" height="32" class="value-bg"/>

<g transform="translate(20, 16)">
